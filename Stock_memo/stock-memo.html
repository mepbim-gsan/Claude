<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ストック管理</title>
<script type="module">
import { initializeApp }   from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, onSnapshot }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const CONFIG_KEY = 'firebase-config-v1';
const FIRESTORE_DOC = 'stock-main';

function loadConfig() {
  try { const s = localStorage.getItem(CONFIG_KEY); return s ? JSON.parse(s) : null; }
  catch { return null; }
}

window._parseFirebaseConfig = function(text) {
  if (!text || !text.trim()) return null;
  try { return JSON.parse(text.trim()); } catch {}
  try {
    let s = text.replace(/\/\/.*$/gm,'').replace(/const\s+\w+\s*=\s*/g,'').replace(/;?\s*$/,'').trim();
    const match = s.match(/\{[\s\S]*\}/);
    if (!match) return null;
    const jsonStr = match[0].replace(/([{,]\s*)(\w+)\s*:/g,'$1"$2":').replace(/'/g,'"');
    return JSON.parse(jsonStr);
  } catch {}
  return null;
};
window._saveFirebaseConfig = cfg => localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg));
window._clearFirebaseConfig = () => localStorage.removeItem(CONFIG_KEY);

let auth, db, _unsubscribe = null;

function initFirebase(cfg) {
  if (!cfg || !cfg.apiKey) return false;
  try {
    const app = initializeApp(cfg);
    auth = getAuth(app);
    db   = getFirestore(app);
    setupAuth();
    return true;
  } catch(e) { console.error('Firebase init error:', e); return false; }
}

function setupAuth() {
  window._fbLogin = async () => {
    try {
      const provider = new GoogleAuthProvider();
      provider.setCustomParameters({ prompt: 'select_account' });
      await signInWithPopup(auth, provider);
    } catch(e) {
      console.error('login error:', e);
      const info = document.getElementById('auth-info');
      if (info) info.textContent = 'エラー: ' + (e.code || e.message);
    }
  };

  window._fbLogout = async () => {
    if (_unsubscribe) { _unsubscribe(); _unsubscribe = null; }
    await signOut(auth);
    updateAuthUI(null);
  };

  window._saveToFirestore = async (stateObj) => {
    if (!auth || !auth.currentUser) return;
    try {
      const ref = doc(db, 'shared', FIRESTORE_DOC);
      await setDoc(ref, stateObj);
    } catch(e) { console.error('Firestore write error:', e); }
  };

  window._getCurrentUserName = () => {
    return auth && auth.currentUser ? (auth.currentUser.displayName || auth.currentUser.email || null) : null;
  };

  onAuthStateChanged(auth, user => {
    updateAuthUI(user);
    if (_unsubscribe) { _unsubscribe(); _unsubscribe = null; }
    if (user) {
      const ref = doc(db, 'shared', FIRESTORE_DOC);
      _unsubscribe = onSnapshot(ref, snap => {
        if (snap.exists()) {
          window._applyRemoteState(snap.data());
        } else {
          // CHANGED: Firestoreに未登録 → カテゴリ初期値・品目空で始める
          window._applyRemoteState({ categories: ['食品', 'キッチン', '洗濯・バス', 'トイレ・ティッシュ', 'その他'], items: [] });
        }
      });
    }
  });
}

function updateAuthUI(user) {
  const btn  = document.getElementById('auth-btn');
  const info = document.getElementById('auth-info');
  if (!btn) return;
  if (user) {
    btn.textContent  = 'ログアウト';
    btn.onclick      = window._fbLogout;
    info.textContent = user.displayName || user.email || '';
    info.title       = user.email || '';
  } else {
    btn.textContent  = 'Googleログイン';
    btn.onclick      = window._fbLogin;
    info.textContent = '未ログイン';
    info.title       = '';
  }
  if (window._renderFirebaseConfigUI) window._renderFirebaseConfigUI();
}

window._renderFirebaseConfigUI = function() {
  const section = document.getElementById('firebase-config-section');
  if (!section) return;
  const cfg = loadConfig();
  if (cfg) {
    section.innerHTML =
      '<div style="font-size:13px;color:var(--accent);margin-bottom:8px;">✅ Firebase config 設定済み</div>' +
      '<div style="font-size:11px;color:var(--text-sub);margin-bottom:12px;">projectId: ' + (cfg.projectId || '—') + '</div>' +
      '<button class="btn-icon" onclick="window._clearConfigFromUI()">🗑️ configを削除して再設定</button>' +
      '<div id="firebase-config-msg" style="font-size:12px;margin-top:8px;"></div>';
  } else {
    section.innerHTML =
      '<div style="font-size:13px;color:var(--text-sub);margin-bottom:10px;">Firebase configを設定してください</div>' +
      '<textarea id="firebase-config-input" style="width:100%;height:120px;font-size:12px;font-family:monospace;border:1px solid var(--border);border-radius:8px;padding:8px;background:var(--bg);color:var(--text);resize:vertical" placeholder="Firebase configをここに貼り付け"></textarea>' +
      '<button class="btn-save" style="width:100%;margin-top:8px" onclick="window._applyConfigFromUI()">保存して接続</button>' +
      '<div id="firebase-config-msg" style="font-size:12px;margin-top:8px;"></div>';
  }
};

window._applyConfigFromUI = function() {
  const ta  = document.getElementById('firebase-config-input');
  const msg = document.getElementById('firebase-config-msg');
  if (!ta) return;
  const cfg = window._parseFirebaseConfig(ta.value);
  if (!cfg || !cfg.apiKey) {
    msg.textContent = '❌ 解析できませんでした。形式を確認してください。';
    return;
  }
  window._saveFirebaseConfig(cfg);
  const ok = initFirebase(cfg);
  if (ok) {
    msg.textContent = '✅ 保存しました。ページをリロードします…';
    setTimeout(() => location.reload(), 1200);
  } else {
    msg.textContent = '❌ Firebase初期化に失敗しました。';
  }
};

window._clearConfigFromUI = function() {
  window._clearFirebaseConfig();
  const msg = document.getElementById('firebase-config-msg');
  if (msg) { msg.textContent = '🗑️ configを削除しました。ページをリロードします…'; }
  setTimeout(() => location.reload(), 1200);
};

const savedConfig = loadConfig();
if (savedConfig) {
  initFirebase(savedConfig);
} else {
  window.addEventListener('DOMContentLoaded', () => {
    const btn  = document.getElementById('auth-btn');
    const info = document.getElementById('auth-info');
    if (btn)  { btn.textContent = 'Firebase未設定'; btn.onclick = () => openSettings(); }
    if (info) info.textContent = '設定からconfigを入力';
  });
}
</script>

<body>

<!-- ヘッダー -->
<div class="header">
  <div class="header-inner">
    <div class="header-title">📦 ストック管理</div>
    <div class="header-btns">
      <span id="auth-info" style="font-size:12px;color:var(--text-sub);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
      <button class="btn-icon" id="auth-btn">Googleログイン</button>
      <button class="btn-icon" onclick="openBuyList()">🛒 補充リスト</button>
      <button class="btn-icon" onclick="openSettings()">⚙️</button>
    </div>
  </div>
</div>

<!-- カテゴリタブ -->
<div class="tab-bar" id="tabBar"></div>

<!-- カード一覧 -->
<div class="card-list" id="cardList"></div>

<!-- FAB -->
<div class="fab-area">
  <button class="fab fab-primary" onclick="openItemModal()">＋ 品目追加</button>
</div>

<!-- 品目追加・編集モーダル -->
<div class="overlay" id="itemOverlay">
  <div class="modal">
    <div class="modal-title" id="itemModalTitle">品目を追加</div>
    <div class="form-row">
      <label>品目名</label>
      <input type="text" id="fName" placeholder="例：食器洗剤">
    </div>
    <div class="form-row">
      <label>カテゴリ</label>
      <select id="fCat"></select>
    </div>
    <div class="form-row form-row-2col">
      <div>
        <label>現在のストック数</label>
        <div class="stepper">
          <button type="button" class="stepper-btn" onclick="stepVal('fStock',-1)">－</button>
          <span class="stepper-val" id="fStock">0</span>
          <button type="button" class="stepper-btn" onclick="stepVal('fStock',+1)">＋</button>
        </div>
      </div>
      <div>
        <label>目標在庫数</label>
        <div class="stepper">
          <button type="button" class="stepper-btn" onclick="stepVal('fTarget',-1)">－</button>
          <span class="stepper-val" id="fTarget">2</span>
          <button type="button" class="stepper-btn" onclick="stepVal('fTarget',+1)">＋</button>
        </div>
      </div>
    </div>
    <div class="form-row">
      <label>備考</label>
      <textarea id="fNote"></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeItemModal()">キャンセル</button>
      <button class="btn-save" onclick="saveItem()">保存</button>
    </div>
    <button class="btn-delete" id="btnDelete" style="display:none" onclick="deleteItem()">この品目を削除</button>
  </div>
</div>

<!-- 補充リストモーダル -->
<div class="overlay" id="buyOverlay">
  <div class="modal">
    <div class="modal-title">🛒 補充リスト</div>
    <ul class="buy-list" id="buyList"></ul>
    <div class="buy-section-label">── 出発前 ──</div>
    <button class="btn-copy" onclick="copyBuyList()">📋 テキストをコピー</button>
    <div class="buy-section-label">── 帰宅後 ──</div>
    <button class="btn-reflect" onclick="reflectBuyList()">✅ 在庫に反映して閉じる</button>
    <button class="btn-cancel" style="width:100%;margin-top:8px" onclick="closeBuyList()">キャンセル</button>
  </div>
</div>

<!-- 設定モーダル -->
<div class="overlay" id="settingsOverlay">
  <div class="modal">
    <div class="modal-title">⚙️ 設定</div>
    <div class="form-row">
      <label>カテゴリ管理</label>
      <div id="catList" style="margin-bottom:8px"></div>
      <div style="display:flex;gap:8px">
        <input type="text" id="newCatName" placeholder="新しいカテゴリ名" style="flex:1">
        <button class="btn-save" style="flex:none;padding:10px 14px;font-size:13px" onclick="addCategory()">追加</button>
      </div>
    </div>
    <div class="form-row" style="margin-top:8px">
      <label style="margin-bottom:8px">Firebase</label>
      <div id="firebase-config-section">読み込み中…</div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" style="width:100%;flex:none" onclick="closeSettings()">閉じる</button>
    </div>
  </div>
</div>

<!-- 確認ダイアログ -->
<div class="dialog-overlay" id="dialogOverlay">
  <div class="dialog-box">
    <div class="dialog-msg" id="dialogMsg"></div>
    <div class="dialog-btns">
      <button class="dialog-cancel" id="dialogCancel">キャンセル</button>
      <button class="dialog-ok" id="dialogOk">削除</button>
    </div>
  </div>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// データ
// ============================================================
const STORE_KEY = 'stock-memo-v1';

function loadData() {
  try {
    const s = localStorage.getItem(STORE_KEY);
    return s ? JSON.parse(s) : null;
  } catch { return null; }
}

function saveData() {
  localStorage.setItem(STORE_KEY, JSON.stringify(ST));
  if (window._saveToFirestore) window._saveToFirestore(ST); // CHANGED: Firebase同期
}

// CHANGED: Firestoreからのリモートデータ適用
window._applyRemoteState = function(data) {
  if (!data || !data.items) return;
  ST = data;
  renderTabs();
  renderCards();
};

const now = Date.now();
const DAY = 86400000;
const DEFAULT = {
  categories: ['食品', 'キッチン', '洗濯・バス', 'トイレ・ティッシュ', 'その他'],
  items: [
    { id: '1',  name: 'マヨネーズ',         cat: '食品',              stock: 1, target: 2, note: '',               updatedAt: now - 3*DAY },
    { id: '2',  name: 'ケチャップ',          cat: '食品',              stock: 0, target: 1, note: '',               updatedAt: now - 18*DAY },
    { id: '3',  name: '鍋の素',              cat: '食品',              stock: 2, target: 3, note: 'とんこつ・キムチ・寄せ鍋', updatedAt: now - 45*DAY },
    { id: '4',  name: 'めんつゆ',            cat: '食品',              stock: 1, target: 2, note: '',               updatedAt: now - 12*DAY },
    { id: '5',  name: '食器洗剤',            cat: 'キッチン',          stock: 1, target: 2, note: '詰め替え用',     updatedAt: now - 6*DAY },
    { id: '6',  name: 'ラップ',              cat: 'キッチン',          stock: 2, target: 2, note: '',               updatedAt: now - 22*DAY },
    { id: '7',  name: 'アルミホイル',        cat: 'キッチン',          stock: 1, target: 1, note: '',               updatedAt: now - 60*DAY },
    { id: '8',  name: 'キッチンペーパー',    cat: 'キッチン',          stock: 0, target: 2, note: '',               updatedAt: now - 9*DAY },
    { id: '9',  name: '洗濯洗剤',            cat: '洗濯・バス',        stock: 1, target: 2, note: '詰め替え用',     updatedAt: now - 4*DAY },
    { id: '10', name: '柔軟剤',              cat: '洗濯・バス',        stock: 0, target: 2, note: '詰め替え用',     updatedAt: now - 2*DAY },
    { id: '11', name: 'ハンドソープ',        cat: '洗濯・バス',        stock: 2, target: 2, note: '詰め替え用',     updatedAt: now - 16*DAY },
    { id: '12', name: 'ボディソープ',        cat: '洗濯・バス',        stock: 1, target: 2, note: '詰め替え用',     updatedAt: now - 30*DAY },
    { id: '13', name: 'トイレットペーパー',  cat: 'トイレ・ティッシュ', stock: 2, target: 2, note: '8ロール×2パック', updatedAt: now - 1*DAY },
    { id: '14', name: 'ティッシュ',          cat: 'トイレ・ティッシュ', stock: 3, target: 3, note: '5箱パック換算',  updatedAt: now - 25*DAY },
    { id: '15', name: 'トイレ洗剤',          cat: 'トイレ・ティッシュ', stock: 1, target: 2, note: '',               updatedAt: now - 40*DAY },
    { id: '16', name: 'ゴミ袋（45L）',       cat: 'その他',            stock: 1, target: 2, note: '',               updatedAt: now - 8*DAY },
    { id: '17', name: '電池（単3）',         cat: 'その他',            stock: 2, target: 4, note: '',               updatedAt: now - 90*DAY },
  ]
};

let ST = loadData() || JSON.parse(JSON.stringify(DEFAULT));

// ============================================================
// 状態
// ============================================================
let curCat = 'all';
let editingId = null;
let buyItems = []; // { id, name, qty, checked }

// ============================================================
// タブ
// ============================================================
function renderTabs() {
  const bar = document.getElementById('tabBar');
  const cats = ['all', ...ST.categories];
  bar.innerHTML = cats.map(c => `
    <button class="tab ${curCat === c ? 'active' : ''}" onclick="selectTab('${c}')">
      ${c === 'all' ? 'すべて' : c}
    </button>
  `).join('');
}

function selectTab(cat) {
  curCat = cat;
  renderTabs();
  renderCards();
}

// ============================================================
// カード
// ============================================================
function sortedItems(items) {
  const catOrder = ST.categories;
  return [...items].sort((a, b) => {
    const alertA = a.stock < a.target ? 0 : 1;
    const alertB = b.stock < b.target ? 0 : 1;
    if (alertA !== alertB) return alertA - alertB;
    return catOrder.indexOf(a.cat) - catOrder.indexOf(b.cat);
  });
}

function relativeTime(ts) {
  if (!ts) return '';
  const diff = Date.now() - ts;
  const min  = Math.floor(diff / 60000);
  const hour = Math.floor(diff / 3600000);
  const day  = Math.floor(diff / 86400000);
  if (min < 1)   return 'たった今';
  if (min < 60)  return `${min}分前`;
  if (hour < 24) return `${hour}時間前`;
  if (day < 30)  return `${day}日前`;
  const month = Math.floor(day / 30);
  if (month < 12) return `${month}ヶ月前`;
  return `${Math.floor(month / 12)}年前`;
}

function renderCards() {
  const list = document.getElementById('cardList');
  const base = curCat === 'all'
    ? ST.items
    : ST.items.filter(i => i.cat === curCat);
  const items = sortedItems(base);

  if (items.length === 0) {
    list.innerHTML = '<div class="no-items">品目がありません</div>';
    return;
  }

  list.innerHTML = items.map(item => {
    const alert = item.stock < item.target;
    return `
      <div class="card ${alert ? 'alert' : ''}" id="card-${item.id}">
        <div class="card-top">
          <span class="card-name" onclick="openItemModal('${item.id}')">${item.name}</span>
          <span class="card-cat">${item.cat}</span>
          ${alert ? '<span class="badge-alert">要補充</span>' : '<span class="badge-alert-placeholder"></span>'}
        </div>
        ${item.note ? `<div class="card-note" id="note-${item.id}">${item.note}
          <button class="btn-edit-note" onclick="showNoteEdit('${item.id}')">編集</button>
        </div>` : `<div class="card-note" id="note-${item.id}">
          <button class="btn-edit-note" onclick="showNoteEdit('${item.id}')">＋ 備考</button>
        </div>`}
        <div id="note-edit-${item.id}"></div>
        <div class="card-bottom">
          <div class="stock-info">
            <div class="stock-num">${item.stock}</div>
            <div class="stock-target">目標: ${item.target}</div>
          </div>
          <div class="ctrl-btns">
            <button class="btn-ctrl minus" onclick="changeStock('${item.id}', -1)">－</button>
            <button class="btn-ctrl" onclick="changeStock('${item.id}', +1)">＋</button>
          </div>
        </div>
        <div class="card-updated" id="updated-${item.id}">${item.updatedBy ? item.updatedBy + ' · ' : ''}${relativeTime(item.updatedAt)}</div>
      </div>
    `;
  }).join('');
}

function changeStock(id, delta) {
  const item = ST.items.find(i => i.id === id);
  if (!item) return;
  item.stock = Math.max(0, item.stock + delta);
  item.updatedAt = Date.now();
  item.updatedBy = (window._getCurrentUserName && window._getCurrentUserName()) || null; // CHANGED
  saveData();
  updateCard(item);
}

function updateCard(item) {
  const card = document.getElementById('card-' + item.id);
  if (!card) return;
  const alert = item.stock < item.target;
  card.className = 'card' + (alert ? ' alert' : '');
  card.querySelector('.stock-num').textContent = item.stock;
  // バッジ
  const badge = card.querySelector('.badge-alert');
  const placeholder = card.querySelector('.badge-alert-placeholder');
  if (alert && !badge) {
    if (placeholder) {
      placeholder.outerHTML = '<span class="badge-alert">要補充</span>';
    }
  } else if (!alert && badge) {
    badge.outerHTML = '<span class="badge-alert-placeholder"></span>';
  }
  const updEl = document.getElementById('updated-' + item.id);
  if (updEl) updEl.textContent = (item.updatedBy ? item.updatedBy + ' · ' : '') + relativeTime(item.updatedAt); // CHANGED
}

// ============================================================
// 備考インライン編集
// ============================================================
function showNoteEdit(id) {
  const item = ST.items.find(i => i.id === id);
  if (!item) return;
  const area = document.getElementById('note-edit-' + id);
  area.innerHTML = `
    <div class="note-edit-area">
      <input class="note-edit-input" id="note-input-${id}" value="${item.note}" placeholder="備考を入力">
      <div class="note-edit-btns">
        <button class="note-save-btn" onclick="saveNote('${id}')">保存</button>
        <button class="note-cancel-btn" onclick="cancelNote('${id}')">キャンセル</button>
      </div>
    </div>
  `;
  document.getElementById('note-input-' + id).focus();
}

function saveNote(id) {
  const item = ST.items.find(i => i.id === id);
  if (!item) return;
  const val = document.getElementById('note-input-' + id).value.trim();
  item.note = val;
  item.updatedAt = Date.now();
  item.updatedBy = (window._getCurrentUserName && window._getCurrentUserName()) || null; // CHANGED
  saveData();
  const noteDiv = document.getElementById('note-' + id);
  const editArea = document.getElementById('note-edit-' + id);
  noteDiv.innerHTML = val
    ? `${val} <button class="btn-edit-note" onclick="showNoteEdit('${id}')">編集</button>`
    : `<button class="btn-edit-note" onclick="showNoteEdit('${id}')">＋ 備考</button>`;
  editArea.innerHTML = '';
}

function cancelNote(id) {
  document.getElementById('note-edit-' + id).innerHTML = '';
}

// ============================================================
// 品目モーダル
// ============================================================
function stepVal(id, delta) {
  const el = document.getElementById(id);
  const cur = parseInt(el.textContent) || 0;
  el.textContent = Math.max(0, cur + delta);
}

function openItemModal(id) {
  editingId = id || null;
  const item = id ? ST.items.find(i => i.id === id) : null;

  document.getElementById('itemModalTitle').textContent = item ? '品目を編集' : '品目を追加';
  document.getElementById('fName').value = item ? item.name : '';
  document.getElementById('fStock').textContent  = item ? item.stock  : 0;
  document.getElementById('fTarget').textContent = item ? item.target : 2;
  document.getElementById('fNote').value = item ? item.note : '';
  document.getElementById('btnDelete').style.display = item ? 'block' : 'none';

  const sel = document.getElementById('fCat');
  sel.innerHTML = ST.categories.map(c =>
    `<option value="${c}" ${item && item.cat === c ? 'selected' : ''}>${c}</option>`
  ).join('');

  document.getElementById('itemOverlay').classList.add('open');
  document.getElementById('fName').focus();
}

function closeItemModal() {
  document.getElementById('itemOverlay').classList.remove('open');
  editingId = null;
}

function saveItem() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { showToast('品目名を入力してください'); return; }
  const cat    = document.getElementById('fCat').value;
  const stock  = parseInt(document.getElementById('fStock').textContent)  || 0;
  const target = parseInt(document.getElementById('fTarget').textContent) || 0;
  const note   = document.getElementById('fNote').value.trim();

  if (editingId) {
    const item = ST.items.find(i => i.id === editingId);
    Object.assign(item, { name, cat, stock, target, note, updatedAt: Date.now(), updatedBy: (window._getCurrentUserName && window._getCurrentUserName()) || null }); // CHANGED
  } else {
    ST.items.push({ id: Date.now().toString(), name, cat, stock, target, note, updatedAt: Date.now(), updatedBy: (window._getCurrentUserName && window._getCurrentUserName()) || null }); // CHANGED
  }
  saveData();
  closeItemModal();
  renderTabs();
  renderCards();
}

function deleteItem() {
  showDialog(`「${ST.items.find(i => i.id === editingId)?.name}」を削除しますか？`, () => {
    ST.items = ST.items.filter(i => i.id !== editingId);
    saveData();
    closeItemModal();
    renderCards();
  });
}

// ============================================================
// 買い出しリスト
// ============================================================
function openBuyList() {
  // 不足品を自動リストアップ
  buyItems = ST.items
    .filter(i => i.stock < i.target)
    .map(i => ({
      id: i.id,
      name: i.name,
      qty: i.target - i.stock,
      checked: true
    }));
  renderBuyList();
  document.getElementById('buyOverlay').classList.add('open');
}

function closeBuyList() {
  document.getElementById('buyOverlay').classList.remove('open');
}

function renderBuyList() {
  const ul = document.getElementById('buyList');
  if (buyItems.length === 0) {
    ul.innerHTML = '<li class="no-items">補充が必要な品目はありません 🎉</li>';
    return;
  }
  ul.innerHTML = buyItems.map((b, idx) => `
    <li class="buy-item">
      <input type="checkbox" class="buy-check" ${b.checked ? 'checked' : ''}
        onchange="toggleBuyItem(${idx}, this.checked)">
      <span class="buy-name" style="${!b.checked ? 'opacity:0.4;text-decoration:line-through' : ''}">${b.name}</span>
      <div class="buy-qty-ctrl">
        <button class="buy-qty-btn" onclick="changeBuyQty(${idx}, -1)">－</button>
        <span class="buy-qty">${b.qty}</span>
        <button class="buy-qty-btn" onclick="changeBuyQty(${idx}, +1)">＋</button>
      </div>
    </li>
  `).join('');
}

function toggleBuyItem(idx, checked) {
  buyItems[idx].checked = checked;
  renderBuyList();
}

function changeBuyQty(idx, delta) {
  buyItems[idx].qty = Math.max(1, buyItems[idx].qty + delta);
  renderBuyList();
}

function copyBuyList() {
  const lines = buyItems
    .filter(b => b.checked)
    .map(b => `・${b.name}　${b.qty}個`);
  if (lines.length === 0) { showToast('選択された品目がありません'); return; }
  const text = '■補充リスト\n' + lines.join('\n');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text)
      .then(() => showToast('コピーしました'))
      .catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function reflectBuyList() {
  const targets = buyItems.filter(b => b.checked);
  if (targets.length === 0) { showToast('チェックされた品目がありません'); return; }
  targets.forEach(b => {
    const item = ST.items.find(i => i.id === b.id);
    if (item) item.stock += b.qty;
  });
  saveData();
  document.getElementById('buyOverlay').classList.remove('open');
  renderCards();
  showToast(`${targets.length}件の在庫を更新しました`);
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try {
    document.execCommand('copy');
    showToast('コピーしました');
  } catch {
    showToast('コピーできませんでした');
  }
  document.body.removeChild(ta);
}

// ============================================================
// 設定
// ============================================================
function openSettings() {
  renderCatList();
  if (window._renderFirebaseConfigUI) window._renderFirebaseConfigUI(); // CHANGED
  document.getElementById('settingsOverlay').classList.add('open');
}

function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('open');
}

function renderCatList() {
  const div = document.getElementById('catList');
  div.innerHTML = ST.categories.map((c, idx) => `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px" id="cat-row-${idx}">
      <span style="flex:1;font-size:14px" id="cat-label-${idx}">${c}</span>
      <button style="font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer"
        onclick="startRenameCategory(${idx})">編集</button>
      <button style="font-size:12px;color:var(--danger);background:none;border:none;cursor:pointer"
        onclick="deleteCategory(${idx})">削除</button>
    </div>
  `).join('');
}

function startRenameCategory(idx) {
  const label = document.getElementById('cat-label-' + idx);
  const current = ST.categories[idx];
  label.outerHTML = `
    <input id="cat-rename-${idx}" value="${current}"
      style="flex:1;border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:14px;font-family:inherit;background:var(--bg)">
  `;
  const input = document.getElementById('cat-rename-' + idx);
  input.focus();
  input.select();
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') commitRenameCategory(idx);
    if (e.key === 'Escape') renderCatList();
  });
  // 編集ボタンを保存ボタンに差し替え
  const row = document.getElementById('cat-row-' + idx);
  const btns = row.querySelectorAll('button');
  btns[0].textContent = '保存';
  btns[0].onclick = () => commitRenameCategory(idx);
}

function commitRenameCategory(idx) {
  const input = document.getElementById('cat-rename-' + idx);
  if (!input) return;
  const newName = input.value.trim();
  if (!newName) { showToast('カテゴリ名を入力してください'); return; }
  if (newName !== ST.categories[idx] && ST.categories.includes(newName)) {
    showToast('同じ名前のカテゴリがあります'); return;
  }
  const oldName = ST.categories[idx];
  ST.categories[idx] = newName;
  ST.items.forEach(i => { if (i.cat === oldName) i.cat = newName; });
  saveData();
  renderCatList();
  renderTabs();
  renderCards();
}

function addCategory() {
  const name = document.getElementById('newCatName').value.trim();
  if (!name) return;
  if (ST.categories.includes(name)) { showToast('同じ名前のカテゴリがあります'); return; }
  ST.categories.push(name);
  saveData();
  document.getElementById('newCatName').value = '';
  renderCatList();
  renderTabs();
}

function deleteCategory(idx) {
  const name = ST.categories[idx];
  const inUse = ST.items.some(i => i.cat === name);
  if (inUse) { showToast('使用中のカテゴリは削除できません'); return; }
  ST.categories.splice(idx, 1);
  saveData();
  renderCatList();
  renderTabs();
}

// ============================================================
// 確認ダイアログ
// ============================================================
function showDialog(msg, onOk) {
  document.getElementById('dialogMsg').textContent = msg;
  const overlay = document.getElementById('dialogOverlay');
  overlay.classList.add('open');
  document.getElementById('dialogOk').onclick = () => {
    overlay.classList.remove('open');
    onOk();
  };
  document.getElementById('dialogCancel').onclick = () => {
    overlay.classList.remove('open');
  };
}

// ============================================================
// トースト
// ============================================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ============================================================
// 初期化
// ============================================================
renderTabs();
renderCards();
</script>
</body>
</html>
